<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Japanese Verb Practice</title>
    <script>
      (function restoreStaticRedirect() {
        var redirectKey = 'jp-verbs-static-redirect-path';
        var currentUrl = new URL(window.location.href);
        var redirectPath = currentUrl.searchParams.get('redirect');

        if (redirectPath) {
          currentUrl.searchParams.delete('redirect');
        } else {
          redirectPath = window.sessionStorage.getItem(redirectKey);
        }

        if (!redirectPath) {
          return;
        }

        window.sessionStorage.removeItem(redirectKey);

        var currentPath = currentUrl.pathname + currentUrl.search + currentUrl.hash;

        if (redirectPath !== currentPath) {
          window.history.replaceState(window.history.state, '', redirectPath);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
